<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Meeting Schedule</title>
<style>
:root {
  --bg: #f1f5f9; --card: #fff; --nav: #1e293b;
  --text: #1e293b; --sub: #64748b; --border: #e2e8f0;
  --wed1:#2563eb; --wed1-l:#dbeafe; --wed1-d:#1d4ed8;
  --wed2:#0d9488; --wed2-l:#ccfbf1; --wed2-d:#0f766e;
  --thu1:#d97706; --thu1-l:#fef3c7; --thu1-d:#b45309;
  --thu2:#7c3aed; --thu2-l:#ede9fe; --thu2-d:#6d28d9;
  --hol:#dc2626;  --hol-l:#fee2e2;
  --now:#0ea5e9;  --arch:#94a3b8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
.nav{background:var(--nav);position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;padding:0 16px;height:54px;gap:4px}
.nav-brand{font-size:15px;font-weight:700;color:#f8fafc;white-space:nowrap;margin-right:8px}
.nav-tab{background:none;border:none;color:#94a3b8;font-size:13px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap}
.nav-tab:hover{background:rgba(255,255,255,.1);color:#f1f5f9}
.nav-tab.active{background:rgba(255,255,255,.18);color:#f8fafc}

/* YEAR BAR */
.year-bar{background:#0f172a;border-bottom:1px solid #1e293b;padding:0 16px}
.year-bar-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:10px;height:40px}
.fy-label{color:#f8fafc;font-size:13px;font-weight:700}
.fy-sub{color:#94a3b8;font-size:12px}
.fy-sep{color:#334155;font-size:14px;margin:0 2px}
.fy-btn{background:none;border:1px solid #334155;color:#94a3b8;padding:3px 10px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.fy-btn:hover{border-color:#94a3b8;color:#f1f5f9}
.fy-btn.fy-active{border-color:#0ea5e9;color:#0ea5e9}
.fy-btn.fy-arch{opacity:.5;font-style:italic}
.fy-new{background:#059669;border:none;color:#fff;padding:3px 10px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;margin-left:auto}
.fy-new:hover{background:#047857}

/* PAGES */
.page{display:none}.page.active{display:block}
.container{max-width:960px;margin:0 auto;padding:24px 16px}

/* UTIL */
.mt8{margin-top:8px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);margin-bottom:12px}
.empty{text-align:center;padding:48px 20px;color:var(--sub);font-size:14px}
.arch-banner{background:#fef3c7;border:1.5px solid #fcd34d;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;color:#92400e;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* BADGE */
.badge{display:inline-block;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:.04em;white-space:nowrap}
.b-Wed1{background:var(--wed1-l);color:var(--wed1-d)}
.b-Wed2{background:var(--wed2-l);color:var(--wed2-d)}
.b-Thu1{background:var(--thu1-l);color:var(--thu1-d)}
.b-Thu2{background:var(--thu2-l);color:var(--thu2-d)}
.b-hol{background:var(--hol-l);color:var(--hol)}
.now-badge{background:var(--now);color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:4px;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}

/* HOME CARDS */
.week-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.week-label{font-size:15px;font-weight:700}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:540px){.cards{grid-template-columns:1fr}}
.mcard{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-top:4px solid var(--border)}
.mcard.cWed1{border-top-color:var(--wed1)}.mcard.cWed2{border-top-color:var(--wed2)}
.mcard.cThu1{border-top-color:var(--thu1)}.mcard.cThu2{border-top-color:var(--thu2)}
.mcard.cHol{border-top-color:var(--hol);background:var(--hol-l)}
.mcard.cNone{border-top-color:var(--border);background:#f8fafc}
.mcard-day{font-size:12px;color:var(--sub);margin-bottom:4px}
.mcard-name{font-size:24px;font-weight:800;margin-bottom:14px}
.mcard.cWed1 .mcard-name{color:var(--wed1)}.mcard.cWed2 .mcard-name{color:var(--wed2)}
.mcard.cThu1 .mcard-name{color:var(--thu1)}.mcard.cThu2 .mcard-name{color:var(--thu2)}
.mcard.cHol  .mcard-name{color:var(--hol)}.mcard.cNone .mcard-name{color:#9ca3af}
.mlist{display:flex;flex-direction:column;gap:5px}
.mitem{font-size:13px;display:flex;align-items:center;gap:7px}
.mitem::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--border);flex-shrink:0}

/* UPCOMING */
.upcoming-box{background:var(--card);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
.up-row{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);gap:10px}
.up-row:last-child{border-bottom:none}
.up-row.hol{background:#fef2f2}
.up-date{font-size:13px;font-weight:600;min-width:120px;flex-shrink:0}
.up-mbrs{font-size:12px;color:var(--sub);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* SCHEDULE */
.sched-stats{display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.sched-stat{font-size:13px;color:var(--sub)}
.sched-stat strong{color:var(--text);font-size:15px}
.wk-block{margin-bottom:18px}
.wk-hd{display:flex;align-items:center;gap:8px;padding:6px 0;margin-bottom:6px}
.wk-hd-label{font-size:12px;font-weight:700;color:var(--sub)}
.wk-hd.is-now .wk-hd-label{color:var(--now)}
.sched-box{background:var(--card);border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
.sched-row{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);gap:12px}
.sched-row:last-child{border-bottom:none}
.sched-row.is-now{background:#eff6ff}
.sched-row.is-past .sched-date,.sched-row.is-past .sched-mbrs{opacity:.4}
.sched-date{font-size:13px;font-weight:600;min-width:120px;flex-shrink:0}
.sched-mbrs{font-size:12px;color:var(--sub);flex:1}

/* HOLIDAYS */
.form-card{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.form-card h3{font-size:14px;font-weight:700;margin-bottom:14px}
.fgrp{display:flex;flex-direction:column;gap:5px;flex:1;min-width:130px}
.fgrp label{font-size:12px;font-weight:600;color:var(--sub)}
.fgrp input,.fgrp select,.fgrp textarea{padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;background:#f8fafc;transition:border-color .2s}
.fgrp input:focus,.fgrp select:focus,.fgrp textarea:focus{border-color:var(--wed1);background:#fff}
.fgrp textarea{resize:vertical;min-height:80px}
.hol-box{background:var(--card);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
.hol-row{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);gap:12px}
.hol-row:last-child{border-bottom:none}
.hol-date{font-size:13px;font-weight:600;min-width:120px;flex-shrink:0}
.hol-name{font-size:13px;color:var(--sub);flex:1}

/* SETTINGS */
.set-sec{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:14px}
.set-sec h3{font-size:14px;font-weight:700;padding-bottom:12px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.grp-edit{border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.grp-edit-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.grp-edit-label{font-size:13px;font-weight:700;flex:1}
.year-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
.year-row:last-child{border-bottom:none}
.year-row-label{font-size:14px;font-weight:700;min-width:70px}
.year-row-sub{font-size:12px;color:var(--sub);flex:1}

/* BUTTONS */
.btn{padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--wed1);color:#fff}.btn-primary:hover{background:var(--wed1-d)}
.btn-success{background:#059669;color:#fff}.btn-success:hover{background:#047857}
.btn-sec{background:var(--border);color:var(--text)}.btn-sec:hover{background:#cbd5e1}
.btn-warn{background:var(--thu1);color:#fff}.btn-warn:hover{background:var(--thu1-d)}
.btn-danger{background:var(--hol);color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-del{background:none;border:1px solid #fecaca;color:var(--hol);padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;transition:background .15s;flex-shrink:0}
.btn-del:hover{background:var(--hol-l)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;width:min(520px,94vw);max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-hd{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;border-radius:14px 14px 0 0}
.modal-hd h2{font-size:16px;font-weight:700}
.modal-x{background:none;border:none;font-size:20px;color:#888;cursor:pointer;padding:0 4px;line-height:1}
.modal-x:hover{color:var(--text)}
.modal-body{padding:20px 22px}
.modal-ft{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff;border-radius:0 0 14px 14px}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--nav);color:#fff;padding:10px 22px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:640px){
  .nav-brand{display:none}
  .nav-tab{padding:6px 8px;flex:1;text-align:center;font-size:12px}
  .container{padding:16px 12px}
  .year-bar-inner{gap:6px}
  .fy-sub{display:none}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand">&#128197; Lab Meeting</div>
    <button class="nav-tab active" data-page="home">Home</button>
    <button class="nav-tab" data-page="schedule">Schedule</button>
    <button class="nav-tab" data-page="holidays">Holidays</button>
    <button class="nav-tab" data-page="settings">Settings</button>
  </div>
</nav>

<div class="year-bar">
  <div class="year-bar-inner" id="yearBar"></div>
</div>

<div id="page-home"     class="page active"><div class="container" id="home-content"></div></div>
<div id="page-schedule" class="page">       <div class="container" id="sched-content"></div></div>
<div id="page-holidays" class="page">       <div class="container" id="hol-content"></div></div>
<div id="page-settings" class="page">       <div class="container" id="set-content"></div></div>

<!-- New Year Modal -->
<div class="overlay" id="newYearModal" onclick="overlayClose(event,'newYearModal')">
  <div class="modal">
    <div class="modal-hd"><h2>Add New Academic Year</h2><button class="modal-x" onclick="closeModal('newYearModal')">&#10005;</button></div>
    <div class="modal-body">
      <div class="row" style="margin-bottom:16px">
        <div class="fgrp"><label>Fiscal Year (starting April)</label>
          <select id="nyFY"></select></div>
      </div>
      <div class="row" style="margin-bottom:16px">
        <div class="fgrp"><label>Wednesday — Week 1</label>
          <select id="nyWed"><option value="Wed1">Wed1</option><option value="Wed2">Wed2</option></select></div>
        <div class="fgrp"><label>Thursday — Week 1</label>
          <select id="nyThu"><option value="Thu1">Thu1</option><option value="Thu2">Thu2</option></select></div>
      </div>
      <div style="font-size:12px;color:var(--sub);background:#f8fafc;padding:10px 12px;border-radius:8px">
        &#9432; National holidays for the selected year will be pre-filled automatically. You can add or remove them in the Holidays tab.
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-sec" onclick="closeModal('newYearModal')">Cancel</button>
      <button class="btn btn-primary" onclick="createYear()">Create Year</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// HOLIDAY DATABASE  (FY = year April starts)
// ═══════════════════════════════════════════════════════════════
const HOL_DB = {
  2025: [
    { date:'2025-04-29', name:'Showa Day' },
    { date:'2025-05-03', name:'Constitution Day' },
    { date:'2025-05-04', name:'Greenery Day' },
    { date:'2025-05-05', name:"Children's Day" },
    { date:'2025-05-06', name:'Substitute Holiday' },
    { date:'2025-07-21', name:'Marine Day' },
    { date:'2025-08-11', name:'Mountain Day' },
    { date:'2025-09-15', name:'Respect for the Aged Day' },
    { date:'2025-09-23', name:'Autumnal Equinox Day' },
    { date:'2025-10-13', name:'Sports Day' },
    { date:'2025-11-03', name:'Culture Day' },
    { date:'2025-11-23', name:'Labor Thanksgiving Day' },
    { date:'2025-11-24', name:'Substitute Holiday' },
    { date:'2026-01-01', name:"New Year's Day" },
    { date:'2026-01-02', name:'New Year Holiday' },
    { date:'2026-01-12', name:'Coming of Age Day' },
    { date:'2026-02-11', name:'National Foundation Day' },
    { date:'2026-02-23', name:"Emperor's Birthday" },
    { date:'2026-03-20', name:'Vernal Equinox Day' },
  ],
  2026: [
    { date:'2026-04-29', name:'Showa Day' },          // Wednesday
    { date:'2026-05-03', name:'Constitution Day' },
    { date:'2026-05-04', name:'Greenery Day' },
    { date:'2026-05-05', name:"Children's Day" },
    { date:'2026-05-06', name:'Substitute Holiday' },  // Wednesday
    { date:'2026-07-20', name:'Marine Day' },
    { date:'2026-08-11', name:'Mountain Day' },
    { date:'2026-09-21', name:'Respect for the Aged Day' },
    { date:'2026-09-23', name:'Autumnal Equinox Day' }, // Wednesday
    { date:'2026-10-12', name:'Sports Day' },
    { date:'2026-11-03', name:'Culture Day' },
    { date:'2026-11-23', name:'Labor Thanksgiving Day' },
    { date:'2027-01-01', name:"New Year's Day" },
    { date:'2027-01-11', name:'Coming of Age Day' },
    { date:'2027-02-11', name:'National Foundation Day' }, // Thursday
    { date:'2027-02-23', name:"Emperor's Birthday" },
    { date:'2027-03-20', name:'Vernal Equinox Day' },
  ],
  2027: [
    { date:'2027-04-29', name:'Showa Day' },
    { date:'2027-05-03', name:'Constitution Day' },
    { date:'2027-05-04', name:'Greenery Day' },
    { date:'2027-05-05', name:"Children's Day" },
    { date:'2027-07-19', name:'Marine Day' },
    { date:'2027-08-11', name:'Mountain Day' },
    { date:'2027-09-20', name:'Respect for the Aged Day' },
    { date:'2027-09-23', name:'Autumnal Equinox Day' },
    { date:'2027-10-11', name:'Sports Day' },
    { date:'2027-11-03', name:'Culture Day' },
    { date:'2027-11-23', name:'Labor Thanksgiving Day' },
    { date:'2028-01-01', name:"New Year's Day" },
    { date:'2028-01-10', name:'Coming of Age Day' },
    { date:'2028-02-11', name:'National Foundation Day' },
    { date:'2028-02-23', name:"Emperor's Birthday" },
    { date:'2028-03-20', name:'Vernal Equinox Day' },
  ],
};

// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════
const STORE = 'labmeeting_v3';
const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const GROUP_DAYS = { Wed1:3, Wed2:3, Thu1:4, Thu2:4 };
const GROUP_CLS  = { Wed1:'cWed1', Wed2:'cWed2', Thu1:'cThu1', Thu2:'cThu2' };
const WED_PAIR   = ['Wed1','Wed2'];
const THU_PAIR   = ['Thu1','Thu2'];

// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════
function curFY() {
  const n = new Date();
  return n.getMonth() >= 3 ? n.getFullYear() : n.getFullYear() - 1;
}

function defaultApp() {
  const fy = curFY();
  return {
    currentFY: fy,
    groups: {
      Wed1: ['Kosaka','Satoh','Uchino','Horie','Hakim'],
      Wed2: ['Kunitoh','Kominami','Kurosaki','Onishi','Hatsuda'],
      Thu1: ['Nishizawa','Kusumi','Nawar','Todoriki','Ohata'],
      Thu2: ['Kobayashi','Tuchihashi','Zeng','Yamashita','Okumura'],
    },
    years: {
      [fy]: {
        wedStartGroup: 'Wed1',
        thuStartGroup: 'Thu1',
        holidays: (HOL_DB[fy] || []).map(h => ({...h})),
        archived: false,
      }
    }
  };
}

function loadData() {
  try {
    const s = localStorage.getItem(STORE);
    if (s) {
      const d = JSON.parse(s);
      // migrate v2 format
      if (d.settings && !d.years) {
        const fy = curFY();
        return {
          currentFY: fy,
          groups: {
            Wed1: ['Kosaka','Satoh','Uchino','Horie','Hakim'],
            Wed2: ['Kunitoh','Kominami','Kurosaki','Onishi','Hatsuda'],
            Thu1: ['Nishizawa','Kusumi','Nawar','Todoriki','Ohata'],
            Thu2: ['Kobayashi','Tuchihashi','Zeng','Yamashita','Okumura'],
          },
          years: {
            [fy]: {
              wedStartGroup: d.settings.wedStartGroup || 'Wed1',
              thuStartGroup: d.settings.thuStartGroup || 'Thu1',
              holidays: (d.holidays || []).map(h => ({...h})),
              archived: false,
            }
          }
        };
      }
      return d;
    }
  } catch {}
  return defaultApp();
}

function saveData() { localStorage.setItem(STORE, JSON.stringify(app)); }

let app = loadData();

// Ensure currentFY year entry exists
if (!app.years[app.currentFY]) {
  app.years[app.currentFY] = { wedStartGroup:'Wed1', thuStartGroup:'Thu1', holidays: (HOL_DB[app.currentFY]||[]).map(h=>({...h})), archived:false };
  saveData();
}

// ═══════════════════════════════════════════════════════════════
// DATE UTILS
// ═══════════════════════════════════════════════════════════════
function parseDate(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function toStr(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function pad(n) { return String(n).padStart(2,'0'); }
function fmtDate(s) { const d=parseDate(s); return `${MON[d.getMonth()]} ${d.getDate()} (${DOW[d.getDay()]})`; }
function fmtWeekRange(mon) {
  const sun=new Date(mon); sun.setDate(sun.getDate()+6);
  const ms=`${MON[mon.getMonth()]} ${mon.getDate()}`;
  if(mon.getMonth()===sun.getMonth()) return `${ms}–${sun.getDate()}, ${mon.getFullYear()}`;
  return `${ms} – ${MON[sun.getMonth()]} ${sun.getDate()}, ${mon.getFullYear()}`;
}
function monday(d) {
  const r=new Date(d); r.setHours(0,0,0,0);
  const dw=r.getDay(); r.setDate(r.getDate()+(dw===0?-6:1-dw)); return r;
}
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function today0() { const d=new Date(); d.setHours(0,0,0,0); return d; }

function fyRange(fy) {
  return { start:`${fy}-04-01`, end:`${fy+1}-03-31` };
}
function fyLabel(fy) { return `FY${fy}`; }
function fyRangeLabel(fy) { return `Apr ${fy} – Mar ${fy+1}`; }

// ═══════════════════════════════════════════════════════════════
// SCHEDULE GENERATION
// ═══════════════════════════════════════════════════════════════
function genSchedule(fy) {
  const yr = app.years[fy];
  if (!yr) return [];
  const { start, end } = fyRange(fy);
  const holMap = {};
  yr.holidays.forEach(h => holMap[h.date] = h.name);

  const s = parseDate(start), e = parseDate(end);
  const events = [];

  function genDay(targetDow, seq) {
    let d = new Date(s);
    while (d.getDay() !== targetDow) d.setDate(d.getDate()+1);
    let idx = 0;
    while (d <= e) {
      const ds = toStr(d);
      if (holMap[ds]) {
        events.push({ date:ds, type:'holiday', group:null, reason:holMap[ds] });
      } else {
        events.push({ date:ds, type:'meeting', group:seq[idx%2] });
        idx++;
      }
      d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+7);
    }
  }

  const wSeq = yr.wedStartGroup==='Wed1' ? WED_PAIR : [...WED_PAIR].reverse();
  const tSeq = yr.thuStartGroup==='Thu1' ? THU_PAIR : [...THU_PAIR].reverse();
  genDay(3, wSeq);
  genDay(4, tSeq);
  events.sort((a,b) => a.date.localeCompare(b.date));
  return events;
}

function weekEvents(events, mon) {
  const s=toStr(mon), e=toStr(addDays(mon,6));
  return events.filter(ev => ev.date>=s && ev.date<=e);
}

function byWeek(events) {
  const map = new Map();
  events.forEach(ev => {
    const m = monday(parseDate(ev.date));
    const k = toStr(m);
    if (!map.has(k)) map.set(k,{mon:m,events:[]});
    map.get(k).events.push(ev);
  });
  return [...map.values()].sort((a,b) => toStr(a.mon).localeCompare(toStr(b.mon)));
}

// Auto-detect which group should start next FY
function detectNextStart(fy, dayNum, pair) {
  const sched = genSchedule(fy);
  const last = [...sched].reverse().find(e => e.type==='meeting' && parseDate(e.date).getDay()===dayNum);
  if (!last) return pair[0];
  return last.group === pair[0] ? pair[1] : pair[0];
}

// ═══════════════════════════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════════════════════════
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function badge(g) {
  if (!g) return `<span class="badge b-hol">Holiday</span>`;
  return `<span class="badge b-${g}">${g}</span>`;
}
function members(g) { return (app.groups[g]||[]).join(', '); }

// ═══════════════════════════════════════════════════════════════
// YEAR BAR
// ═══════════════════════════════════════════════════════════════
function renderYearBar() {
  const sortedFYs = Object.keys(app.years).map(Number).sort();
  const html = sortedFYs.map(fy => {
    const yr = app.years[fy];
    const isActive = fy === app.currentFY;
    const arch = yr.archived ? ' fy-arch' : '';
    const act  = isActive ? ' fy-active' : '';
    return `<button class="fy-btn${arch}${act}" onclick="switchFY(${fy})">${fyLabel(fy)}${yr.archived?' ★':''}</button>`;
  }).join('<span class="fy-sep">|</span>');

  const yr = app.years[app.currentFY];
  document.getElementById('yearBar').innerHTML = `
    <span class="fy-label">${fyLabel(app.currentFY)}</span>
    <span class="fy-sub">${fyRangeLabel(app.currentFY)}</span>
    <span class="fy-sep" style="margin:0 4px">·</span>
    ${html}
    <button class="fy-new" onclick="openNewYear()">+ New Year</button>
  `;
}

function switchFY(fy) {
  app.currentFY = fy;
  saveData();
  renderYearBar();
  renderCurrent();
}

// ═══════════════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════════════
function renderHome() {
  const fy = app.currentFY;
  const yr = app.years[fy];
  const sched = genSchedule(fy);
  const today = today0();
  const thisMon = monday(today);
  const nextMon = addDays(thisMon,7);
  const afterMon = addDays(nextMon,7);

  const upcoming = sched.filter(ev => ev.date >= toStr(afterMon)).slice(0,10);

  document.getElementById('home-content').innerHTML = `
    ${yr.archived ? `<div class="arch-banner">&#9733; Archived Year — ${fyLabel(fy)} (${fyRangeLabel(fy)})</div>` : ''}
    ${weekSection(sched, thisMon, true)}
    <div class="mt24"></div>
    ${weekSection(sched, nextMon, false)}
    ${upcoming.length ? `
    <div class="mt24">
      <div class="sec-title">Upcoming</div>
      <div class="upcoming-box">
        ${upcoming.map(ev => `
          <div class="up-row ${ev.type==='holiday'?'hol':''}">
            <div class="up-date">${fmtDate(ev.date)}</div>
            ${badge(ev.group)}
            <div class="up-mbrs">${ev.type==='meeting' ? members(ev.group) : esc(ev.reason)}</div>
          </div>`).join('')}
      </div>
    </div>` : ''}`;
}

function weekSection(sched, mon, isThis) {
  const evs = weekEvents(sched, mon);
  const wedEv = evs.find(e => parseDate(e.date).getDay()===3);
  const thuEv = evs.find(e => parseDate(e.date).getDay()===4);
  return `
    <div>
      <div class="week-header">
        ${isThis ? '<span class="now-badge">This Week</span>' : ''}
        <span class="week-label">${isThis ? '' : 'Next Week — '}${fmtWeekRange(mon)}</span>
      </div>
      <div class="cards">
        ${meetCard(wedEv,'Wednesday')}
        ${meetCard(thuEv,'Thursday')}
      </div>
    </div>`;
}

function meetCard(ev, day) {
  if (!ev) return `<div class="mcard cNone"><div class="mcard-day">${day}</div><div class="mcard-name">—</div><div style="font-size:12px;color:#9ca3af">Outside schedule range</div></div>`;
  if (ev.type==='holiday') return `<div class="mcard cHol"><div class="mcard-day">${fmtDate(ev.date)} · ${day}</div><div class="mcard-name">Holiday</div><div style="font-size:13px;color:var(--hol)">${esc(ev.reason)}</div><div style="font-size:12px;color:#9ca3af;margin-top:8px">No meeting this week</div></div>`;
  const ms = (app.groups[ev.group]||[]);
  return `<div class="mcard ${GROUP_CLS[ev.group]}"><div class="mcard-day">${fmtDate(ev.date)} · ${day}</div><div class="mcard-name">${ev.group}</div><div class="mlist">${ms.map(m=>`<div class="mitem">${esc(m)}</div>`).join('')}</div></div>`;
}

// ═══════════════════════════════════════════════════════════════
// SCHEDULE
// ═══════════════════════════════════════════════════════════════
function renderSchedule() {
  const fy = app.currentFY;
  const yr = app.years[fy];
  const sched = genSchedule(fy);
  if (!sched.length) { document.getElementById('sched-content').innerHTML=`<div class="empty">No schedule data.</div>`; return; }

  const today = today0();
  const thisMon = monday(today);
  const thisMStr = toStr(thisMon);
  const todayStr = toStr(today);
  const total = sched.filter(e=>e.type==='meeting').length;
  const done  = sched.filter(e=>e.type==='meeting' && e.date<todayStr).length;
  const weeks = byWeek(sched);

  let html = `
    ${yr.archived ? `<div class="arch-banner">&#9733; Archived Year — ${fyLabel(fy)} (${fyRangeLabel(fy)})</div>` : ''}
    <div class="sched-stats row">
      <div class="sched-stat"><strong>${total}</strong> meetings total</div>
      <div class="sched-stat"><strong>${done}</strong> completed</div>
      <div class="sched-stat"><strong>${total-done}</strong> remaining</div>
      <button class="btn btn-sec btn-sm" style="margin-left:auto" onclick="jumpNow()">Jump to Today</button>
    </div>`;

  weeks.forEach(wk => {
    const wkStr = toStr(wk.mon);
    const isNow = wkStr === thisMStr;
    const isPast = wkStr < thisMStr;
    html += `<div class="wk-block" id="wk-${wkStr}">
      <div class="wk-hd ${isNow?'is-now':''}">
        ${isNow?'<span class="now-badge">Now</span>':''}
        <span class="wk-hd-label">${fmtWeekRange(wk.mon)}</span>
      </div>
      <div class="sched-box">
        ${wk.events.map(ev => schedRow(ev,isNow,isPast)).join('')}
      </div>
    </div>`;
  });

  document.getElementById('sched-content').innerHTML = html;
}

function schedRow(ev, isNow, isPast) {
  const dt = `<div class="sched-date">${fmtDate(ev.date)}</div>`;
  if (ev.type==='holiday') return `<div class="sched-row ${isPast?'is-past':''}">${dt}${badge(null)}<div class="sched-mbrs">${esc(ev.reason)}</div></div>`;
  return `<div class="sched-row ${isNow?'is-now':''} ${isPast?'is-past':''}">${dt}${badge(ev.group)}<div class="sched-mbrs">${members(ev.group)}</div></div>`;
}

function jumpNow() {
  const el = document.getElementById(`wk-${toStr(monday(today0()))}`);
  if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ═══════════════════════════════════════════════════════════════
// HOLIDAYS
// ═══════════════════════════════════════════════════════════════
function renderHolidays() {
  const fy = app.currentFY;
  const yr = app.years[fy];
  const sorted = [...yr.holidays].sort((a,b)=>a.date.localeCompare(b.date));
  const { start, end } = fyRange(fy);

  document.getElementById('hol-content').innerHTML = `
    <div class="form-card" style="margin-bottom:16px">
      <h3>Add Holiday / Professor Absent — ${fyLabel(fy)}</h3>
      <div class="row">
        <div class="fgrp">
          <label>Date (${start.slice(0,7)} – ${end.slice(0,7)})</label>
          <input type="date" id="hDate" min="${start}" max="${end}">
        </div>
        <div class="fgrp"><label>Reason</label>
          <input type="text" id="hName" autocomplete="off" placeholder="National Holiday / Prof. Absent / etc.">
        </div>
        <div style="display:flex;align-items:flex-end">
          <button class="btn btn-primary" onclick="addHoliday()">Add</button>
        </div>
      </div>
    </div>
    <div class="sec-title">${sorted.length} entries in ${fyLabel(fy)} (${fyRangeLabel(fy)})</div>
    ${sorted.length===0
      ? `<div class="empty">No entries yet.</div>`
      : `<div class="hol-box">${sorted.map(h=>`
          <div class="hol-row">
            <div class="hol-date">${fmtDate(h.date)}</div>
            <div class="hol-name">${esc(h.name)}</div>
            <button class="btn-del" onclick="delHoliday('${h.date}')">Remove</button>
          </div>`).join('')}</div>`}`;
}

function addHoliday() {
  const fy = app.currentFY;
  const date = document.getElementById('hDate').value;
  const name = document.getElementById('hName').value.trim();
  if (!date) { toast('Please select a date'); return; }
  if (!name) { toast('Please enter a reason'); return; }
  if (app.years[fy].holidays.some(h=>h.date===date)) { toast('Date already exists'); return; }
  app.years[fy].holidays.push({date,name});
  saveData(); renderHolidays(); renderHome(); toast('Added');
}

function delHoliday(date) {
  const fy = app.currentFY;
  app.years[fy].holidays = app.years[fy].holidays.filter(h=>h.date!==date);
  saveData(); renderHolidays(); renderHome(); toast('Removed');
}

// ═══════════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════════
function renderSettings() {
  const fys = Object.keys(app.years).map(Number).sort();

  document.getElementById('set-content').innerHTML = `
    <!-- Year management -->
    <div class="set-sec">
      <h3>Academic Years</h3>
      ${fys.map(fy => {
        const yr = app.years[fy];
        return `<div class="year-row">
          <div class="year-row-label">${fyLabel(fy)}</div>
          <div class="year-row-sub">${fyRangeLabel(fy)} · Wed starts: ${yr.wedStartGroup} · Thu starts: ${yr.thuStartGroup}</div>
          <button class="btn btn-sec btn-sm" onclick="switchFY(${fy});navigate('home')">${app.currentFY===fy?'Viewing':'View'}</button>
          <button class="btn btn-sm ${yr.archived?'btn-warn':'btn-sec'}" onclick="toggleArchive(${fy})">${yr.archived?'Unarchive':'Archive'}</button>
          ${fys.length>1?`<button class="btn btn-danger btn-sm" onclick="deleteFY(${fy})">Delete</button>`:''}
        </div>`;
      }).join('')}
      <div class="mt16">
        <button class="btn btn-success" onclick="openNewYear()">+ Add New Academic Year</button>
      </div>
    </div>

    <!-- Starting groups for current FY -->
    <div class="set-sec">
      <h3>Starting Groups — ${fyLabel(app.currentFY)}</h3>
      <p style="font-size:12px;color:var(--sub);margin-bottom:12px">Which group meets in the very first week of the academic year.</p>
      <div class="row">
        <div class="fgrp"><label>Wednesday — Week 1</label>
          <select id="sWed">
            <option value="Wed1" ${app.years[app.currentFY].wedStartGroup==='Wed1'?'selected':''}>Wed1</option>
            <option value="Wed2" ${app.years[app.currentFY].wedStartGroup==='Wed2'?'selected':''}>Wed2</option>
          </select>
        </div>
        <div class="fgrp"><label>Thursday — Week 1</label>
          <select id="sThu">
            <option value="Thu1" ${app.years[app.currentFY].thuStartGroup==='Thu1'?'selected':''}>Thu1</option>
            <option value="Thu2" ${app.years[app.currentFY].thuStartGroup==='Thu2'?'selected':''}>Thu2</option>
          </select>
        </div>
      </div>
      <div class="mt16">
        <button class="btn btn-primary" onclick="saveStartGroups()">Save</button>
      </div>
    </div>

    <!-- Group members editor -->
    <div class="set-sec">
      <h3>Group Members <span style="font-size:12px;font-weight:400;color:var(--sub)">(one name per line)</span></h3>
      ${['Wed1','Wed2','Thu1','Thu2'].map(g => `
        <div class="grp-edit">
          <div class="grp-edit-head">
            ${badge(g)}
            <span class="grp-edit-label">${g} — ${g.startsWith('W')?'Wednesday':'Thursday'}</span>
          </div>
          <div class="fgrp">
            <textarea id="grp-${g}" rows="5">${(app.groups[g]||[]).map(esc).join('\n')}</textarea>
          </div>
        </div>`).join('')}
      <button class="btn btn-primary mt8" onclick="saveMembers()">Save Members</button>
    </div>

    <!-- Data -->
    <div class="set-sec">
      <h3>Data</h3>
      <div class="row">
        <button class="btn btn-success" onclick="exportJSON()">Export JSON</button>
        <button class="btn btn-sec" onclick="document.getElementById('importFile').click()">Import JSON</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
      </div>
    </div>

    <div class="set-sec" style="border:1.5px solid #fecaca">
      <h3 style="color:var(--hol)">Danger Zone</h3>
      <button class="btn btn-danger" onclick="resetAll()">Reset All Data to Defaults</button>
    </div>`;
}

function saveStartGroups() {
  const fy = app.currentFY;
  app.years[fy].wedStartGroup = document.getElementById('sWed').value;
  app.years[fy].thuStartGroup = document.getElementById('sThu').value;
  saveData(); toast('Saved'); renderHome();
}

function saveMembers() {
  ['Wed1','Wed2','Thu1','Thu2'].forEach(g => {
    const raw = document.getElementById(`grp-${g}`).value;
    app.groups[g] = raw.split('\n').map(s=>s.trim()).filter(Boolean);
  });
  saveData(); toast('Members saved'); renderHome();
}

function toggleArchive(fy) {
  app.years[fy].archived = !app.years[fy].archived;
  saveData(); renderSettings(); renderYearBar(); renderHome();
  toast(app.years[fy].archived ? `${fyLabel(fy)} archived` : `${fyLabel(fy)} unarchived`);
}

function deleteFY(fy) {
  if (!confirm(`Delete ${fyLabel(fy)} and all its data? This cannot be undone.`)) return;
  delete app.years[fy];
  if (app.currentFY === fy) {
    app.currentFY = Math.max(...Object.keys(app.years).map(Number));
  }
  saveData(); renderSettings(); renderYearBar(); renderHome();
  toast(`${fyLabel(fy)} deleted`);
}

// ═══════════════════════════════════════════════════════════════
// NEW YEAR MODAL
// ═══════════════════════════════════════════════════════════════
function openNewYear() {
  const existing = Object.keys(app.years).map(Number);
  const maxFY = Math.max(...existing);
  const suggest = maxFY + 1;

  // FY options: next 3 years not yet created
  const select = document.getElementById('nyFY');
  select.innerHTML = '';
  for (let fy = suggest; fy <= suggest + 3; fy++) {
    if (!app.years[fy]) {
      const opt = document.createElement('option');
      opt.value = fy;
      opt.textContent = `${fyLabel(fy)}  (${fyRangeLabel(fy)})`;
      select.appendChild(opt);
    }
  }

  // Auto-detect starting groups from last year
  const wNext = detectNextStart(maxFY, 3, WED_PAIR);
  const tNext = detectNextStart(maxFY, 4, THU_PAIR);
  document.getElementById('nyWed').value = wNext;
  document.getElementById('nyThu').value = tNext;

  openModal('newYearModal');
}

function createYear() {
  const fy = parseInt(document.getElementById('nyFY').value);
  if (!fy) { toast('Select a year'); return; }
  if (app.years[fy]) { toast(`${fyLabel(fy)} already exists`); return; }

  app.years[fy] = {
    wedStartGroup: document.getElementById('nyWed').value,
    thuStartGroup: document.getElementById('nyThu').value,
    holidays: (HOL_DB[fy] || []).map(h => ({...h})),
    archived: false,
  };
  app.currentFY = fy;
  saveData();
  closeModal('newYearModal');
  renderYearBar();
  renderCurrent();
  renderSettings();
  toast(`${fyLabel(fy)} created`);
}

// ═══════════════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════════
function exportJSON() {
  const blob = new Blob([JSON.stringify({version:3, exportedAt:new Date().toISOString(), ...app},null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `meeting-schedule-${toStr(new Date())}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('Exported');
}

function importJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const p = JSON.parse(ev.target.result);
      if (p.groups) app.groups = p.groups;
      if (p.years)  app.years  = p.years;
      if (p.currentFY) app.currentFY = p.currentFY;
      saveData(); renderYearBar(); renderCurrent(); renderSettings();
      toast('Imported');
    } catch { toast('Invalid JSON'); }
  };
  r.readAsText(file); e.target.value='';
}

function resetAll() {
  if (!confirm('Reset all data to defaults? This cannot be undone.')) return;
  app = defaultApp(); saveData();
  renderYearBar(); renderCurrent(); renderSettings();
  toast('Reset complete');
}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
let curPage = 'home';

function navigate(page) {
  curPage = page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelector(`[data-page="${page}"]`).classList.add('active');
  renderCurrent();
}

function renderCurrent() {
  const map = { home:renderHome, schedule:renderSchedule, holidays:renderHolidays, settings:renderSettings };
  map[curPage]();
}

document.querySelectorAll('.nav-tab').forEach(t => t.addEventListener('click', ()=>navigate(t.dataset.page)));

// ═══════════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function overlayClose(e, id) { if (e.target===document.getElementById(id)) closeModal(id); }
document.addEventListener('keydown', e => { if (e.key==='Escape') document.querySelectorAll('.overlay.open').forEach(el=>el.classList.remove('open')); });

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
let _tt;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2400);
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
renderYearBar();
renderHome();
</script>
